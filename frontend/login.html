<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDrive - Login</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="background-animation">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <main class="auth-container">
        <section class="auth-card">
            <div class="auth-header">
                <div class="logo" style="justify-content:center;">
                    <i class="fas fa-cloud"></i>
                    <span>MyDrive</span>
                </div>
                <p>Sign in to manage your files</p>
            </div>

           
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" type="button">Login</button>
                <button class="auth-tab" data-tab="signup" type="button">Sign Up</button>
            </div>

            
            <div id="authError" class="auth-error" style="display:none;"></div>

            
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-group password-input">
                        <i class="fas fa-lock"></i>
                        <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required>
                        <button class="toggle-password" type="button" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button class="btn-primary" type="submit">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
            </form>

            
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input id="signupName" type="text" placeholder="Your name" autocomplete="name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input id="signupEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-group password-input">
                        <i class="fas fa-lock"></i>
                        <input id="signupPassword" type="password" placeholder="Create a password" autocomplete="new-password" required>
                        <button class="toggle-password" type="button" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    
                    <div class="password-strength" aria-hidden="true" style="margin-top:10px;">
                        <div class="strength-track" style="height:4px;background:rgba(255,255,255,0.15);border-radius:999px;overflow:hidden;">
                            <div class="strength-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#667eea,#764ba2);"></div>
                        </div>
                        <small style="display:block;margin-top:8px;opacity:0.8;">
                            Use 8+ characters with upper/lowercase and numbers/symbols.
                        </small>
                    </div>
                </div>

                <button class="btn-primary" type="submit">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn google" type="button">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="social-btn github" type="button">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
            </div>
        </section>
    </main>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Auth logic -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
