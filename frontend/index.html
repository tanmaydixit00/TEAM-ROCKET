<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https://ui-avatars.com data: blob:; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebasestorage.app wss://*.firebaseio.com; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>MiniCloud — Your Files</title>
  <meta name="description" content="MiniCloud: Secure cloud storage for your files.">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <i class="fas fa-cloud"></i>
      <span>MiniCloud</span>
    </div>

    <nav>
      <div class="nav-item active" data-route="my-files">
        <i class="fas fa-folder"></i> My Files
      </div>
      <div class="nav-item" data-route="shared">
        <i class="fas fa-share-nodes"></i> Shared
      </div>
      <div class="nav-item" data-route="starred">
        <i class="fas fa-star"></i> Starred
      </div>
      <div class="nav-item" data-route="recent">
        <i class="fas fa-clock"></i> Recent
      </div>
      <div class="nav-item" data-route="trash">
        <i class="fas fa-trash"></i> Trash
      </div>
    </nav>

    <div class="storage-info">
      <div class="storage-header">
        <span>Storage</span>
        <span>Firebase</span>
      </div>
      <div class="storage-bar">
        <div class="storage-used"></div>
      </div>
      <button class="btn-signout" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search files and folders…" class="search" id="searchInput">
      </div>

      <div class="header-right">
        <div class="user user-profile">
          <img src="https://ui-avatars.com/api/?name=User&background=0083ff&color=fff" alt="User avatar">
          <div class="user-info">
            <span class="user-name">User</span>
            <span class="user-email"></span>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <!-- TOP BAR -->
      <div class="content-top">
        <div>
          <h1 id="pageTitle">My Files</h1>
          <!-- breadcrumbs injected here by JS -->
          <nav class="breadcrumbs" id="breadcrumbs" aria-label="Folder navigation"></nav>
        </div>
        <div class="btn-group" id="actionBtns">
          <button class="btn-secondary" id="newFolderBtn">
            <i class="fas fa-folder-plus"></i> New Folder
          </button>
          <button class="btn-primary" id="uploadBtn">
            <i class="fas fa-upload"></i> Upload
          </button>
        </div>
      </div>

      <!-- UPLOAD AREA -->
      <div class="upload-box" id="uploadZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Drag &amp; drop files or <span>browse</span></p>
        <input type="file" multiple id="fileInput" style="display:none;">
      </div>

      <!-- FILE GRID — populated by main.js -->
      <div class="file-grid" id="filesList">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading…</p>
        </div>
      </div>

    </section>
  </main>

</div>

<!-- ── SHARE MODAL ─────────────────────────────────────── -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3><i class="fas fa-share-nodes"></i> Share File</h3>
      <button class="modal-close" onclick="document.getElementById('shareModal').style.display='none'">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <input id="shareEmail" type="email" placeholder="Enter email address" class="modal-input">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="document.getElementById('shareModal').style.display='none'">Cancel</button>
      <button class="btn-primary" id="shareFileBtn">Share</button>
    </div>
  </div>
</div>

<!-- ── NEW FOLDER MODAL ───────────────────────────────── -->
<div class="modal-overlay" id="folderModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3><i class="fas fa-folder-plus"></i> New Folder</h3>
      <button class="modal-close" onclick="document.getElementById('folderModal').style.display='none'">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <input id="folderName" type="text" placeholder="Folder name" class="modal-input" maxlength="80">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="document.getElementById('folderModal').style.display='none'">Cancel</button>
      <button class="btn-primary" id="createFolderBtn">Create</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- App entry point -->
<script type="module" src="js/main.js"></script>
</body>
</html>
