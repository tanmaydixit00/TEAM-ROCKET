<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniCloud — Your Files</title>
  <meta name="description" content="MiniCloud: Secure cloud storage for your files.">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK (compat) — loaded in <head> so it is available when main.js runs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>

<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <i class="fas fa-cloud"></i>
      <span>MiniCloud</span>
    </div>

    <nav>
      <div class="nav-item active" data-route="my-files">
        <i class="fas fa-folder"></i> My Files
      </div>
      <div class="nav-item" data-route="shared">
        <i class="fas fa-share-nodes"></i> Shared
      </div>
      <div class="nav-item" data-route="starred">
        <i class="fas fa-star"></i> Starred
      </div>
      <div class="nav-item" data-route="recent">
        <i class="fas fa-clock"></i> Recent
      </div>
      <div class="nav-item" data-route="trash">
        <i class="fas fa-trash"></i> Trash
      </div>
    </nav>

    <div class="storage-info">
      <div class="storage-header">
        <span>Storage</span>
        <span>Firebase</span>
      </div>
      <div class="storage-bar">
        <div class="storage-used"></div>
      </div>
      <button class="btn-upgrade" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <input type="text" placeholder="Search files..." class="search" id="searchInput">

      <div class="header-right">
        <button class="icon-btn"><i class="fas fa-bell"></i></button>
        <div class="user user-profile">
          <img src="https://ui-avatars.com/api/?name=User&background=667eea&color=fff" alt="User avatar">
          <span class="user-name">User</span>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <div class="content-top">
        <div>
          <h1 id="pageTitle">My Files</h1>
          <p class="user-email"></p>
        </div>
        <button class="primary-btn" id="uploadBtn">
          <i class="fas fa-upload"></i> Upload
        </button>
      </div>

      <!-- UPLOAD AREA -->
      <div class="upload-box" id="uploadZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Drag &amp; drop files or <span>browse</span></p>
        <input type="file" multiple id="fileInput" class="file-input-hidden">
      </div>

      <!-- FILE GRID — populated by main.js via Firestore -->
      <div class="file-grid" id="filesList">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading...</p>
        </div>
      </div>

    </section>
  </main>

</div>

<!-- SHARE MODAL -->
<div id="shareModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:#1e1e2e; padding:2rem; border-radius:12px; min-width:320px; max-width:90vw;">
    <h3 style="margin:0 0 1rem; color:#fff;">Share File</h3>
    <input id="shareEmail" type="email" placeholder="Enter email address"
      style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); color:#fff; font-size:0.95rem; box-sizing:border-box; margin-bottom:1rem;">
    <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
      <button onclick="document.getElementById('shareModal').style.display='none'"
        style="padding:0.6rem 1.2rem; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:#fff; cursor:pointer;">
        Cancel
      </button>
      <button id="shareFileBtn"
        style="padding:0.6rem 1.2rem; border-radius:8px; border:none; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; cursor:pointer; font-weight:500;">
        Share
      </button>
    </div>
  </div>
</div>

<!-- App entry point -->
<script type="module" src="js/main.js"></script>
</body>
</html>
