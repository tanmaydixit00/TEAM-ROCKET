<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniCloud — Your Files</title>
  <meta name="description" content="MiniCloud: Secure cloud storage for your files.">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <i class="fas fa-cloud"></i>
      <span>MiniCloud</span>
    </div>

    <nav>
      <div class="nav-item active" data-route="my-files">
        <i class="fas fa-folder"></i> My Files
      </div>
      <div class="nav-item" data-route="shared">
        <i class="fas fa-share-nodes"></i> Shared
      </div>
      <div class="nav-item" data-route="starred">
        <i class="fas fa-star"></i> Starred
      </div>
      <div class="nav-item" data-route="recent">
        <i class="fas fa-clock"></i> Recent
      </div>
      <div class="nav-item" data-route="trash">
        <i class="fas fa-trash"></i> Trash
      </div>
    </nav>

    <div class="storage-info">
      <div class="storage-header">
        <span>Storage</span>
        <span>Firebase</span>
      </div>
      <div class="storage-bar">
        <div class="storage-used"></div>
      </div>
      <button class="btn-signout" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search files and folders…" class="search" id="searchInput">
      </div>

      <div class="header-right">
        <div class="user user-profile">
          <img src="https://ui-avatars.com/api/?name=User&background=0083ff&color=fff" alt="User avatar">
          <div class="user-info">
            <span class="user-name">User</span>
            <span class="user-email"></span>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <!-- TOP BAR -->
      <div class="content-top">
        <div>
          <h1 id="pageTitle">My Files</h1>
          <!-- breadcrumbs injected here by JS -->
          <nav class="breadcrumbs" id="breadcrumbs" aria-label="Folder navigation"></nav>
        </div>
        <div class="btn-group" id="actionBtns">
          <button class="btn-secondary" id="newFolderBtn">
            <i class="fas fa-folder-plus"></i> New Folder
          </button>
          <button class="btn-primary" id="uploadBtn">
            <i class="fas fa-upload"></i> Upload
          </button>
        </div>
      </div>

      <!-- UPLOAD AREA -->
      <div class="upload-box" id="uploadZone" role="button" tabindex="0" aria-label="Upload files by clicking or dragging">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Drag &amp; drop files or <span>browse</span></p>
        <input type="file" multiple id="fileInput" style="display:none;">
      </div>

      <!-- FILE GRID — populated by main.js -->
      <div class="file-grid" id="filesList">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading…</p>
        </div>
      </div>

    </section>
  </main>

</div>

<!-- ── SHARE MODAL ─────────────────────────────────────── -->
<div class="modal-overlay" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
  <div class="modal-card share-modal">
    <div class="modal-header">
      <h3 id="shareModalTitle"><i class="fas fa-share-nodes"></i> Share</h3>
      <button class="modal-close" data-close-modal="shareModal" aria-label="Close dialog">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <!-- Step 1: Enter recipient email -->
    <div id="shareStep1">
      <input id="shareEmail" type="email" placeholder="Enter recipient email address" class="modal-input">
      <div class="modal-footer">
        <button class="btn-ghost" data-close-modal="shareModal">Cancel</button>
        <button class="btn-primary" id="shareFileBtn">Next</button>
      </div>
    </div>

    <!-- Step 2: Share link + send options -->
    <div id="shareStep2" style="display:none;">
      <p class="share-info" id="shareFileInfo"></p>
      <div class="share-link-box">
        <input id="shareLinkInput" type="text" readonly class="share-link-input">
        <button class="btn-copy" id="copyShareLinkBtn" title="Copy link">
          <i class="fas fa-copy"></i>
        </button>
      </div>
      <div class="share-actions">
        <button class="btn-share-option" id="shareViaGmail">
          <i class="fab fa-google"></i> Open in Gmail
        </button>
        <button class="btn-share-option" id="shareViaOutlook">
          <i class="fab fa-microsoft"></i> Open in Outlook
        </button>
      </div>
      <div class="modal-footer" style="margin-top:16px;">
        <button class="btn-ghost" id="shareBackBtn">Back</button>
        <button class="btn-primary" data-close-modal="shareModal">Done</button>
      </div>
    </div>
  </div>
</div>

<!-- ── NEW FOLDER MODAL ───────────────────────────────── -->
<div class="modal-overlay" id="folderModal" role="dialog" aria-modal="true" aria-labelledby="folderModalTitle">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="folderModalTitle"><i class="fas fa-folder-plus"></i> New Folder</h3>
      <button class="modal-close" data-close-modal="folderModal" aria-label="Close dialog">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <input id="folderName" type="text" placeholder="Folder name" class="modal-input" maxlength="80">
    <div class="modal-footer">
      <button class="btn-ghost" data-close-modal="folderModal">Cancel</button>
      <button class="btn-primary" id="createFolderBtn">Create</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat) — Auth + Firestore only -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- App entry point -->
<script type="module" src="js/main.js"></script>
</body>
</html>
